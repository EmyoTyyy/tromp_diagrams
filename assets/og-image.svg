<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0e0f1c"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stylised mini Tromp diagram on the right.  Just enough lines to
       say "lambda calculus" without overwhelming the title. -->
  <g stroke="#7aa2f7" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55">
    <line x1="780"  y1="160" x2="1100" y2="160"/>
    <line x1="780"  y1="160" x2="780"  y2="380"/>
    <line x1="900"  y1="160" x2="900"  y2="320"/>
    <line x1="1020" y1="160" x2="1020" y2="280"/>
    <line x1="1100" y1="160" x2="1100" y2="380"/>

    <line x1="820"  y1="240" x2="1060" y2="240"/>
    <line x1="820"  y1="240" x2="820"  y2="380"/>
    <line x1="940"  y1="240" x2="940"  y2="320"/>
    <line x1="1060" y1="240" x2="1060" y2="380"/>

    <line x1="780"  y1="320" x2="940"  y2="320"/>
    <line x1="1020" y1="280" x2="1100" y2="280"/>
  </g>

  <!-- Big λ -->
  <text x="120" y="380"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="380"
        font-weight="400"
        fill="url(#accent)">λ</text>

  <!-- Title block -->
  <text x="320" y="290"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="78"
        font-weight="700"
        fill="#e6e8f0">Tromp Diagrams</text>

  <text x="320" y="350"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32"
        font-weight="400"
        fill="#9aa0b4">lambda calculus, drawn out</text>

  <!-- Footer URL strip -->
  <text x="120" y="560"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="22"
        fill="#6f7689">visualize · play · learn · explore</text>
</svg>
