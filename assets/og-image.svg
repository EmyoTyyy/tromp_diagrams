<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Solid bg matches the embedded PNG's padding colour exactly,
       so the PNG's edges blend invisibly. No gradient — gradients
       always create a seam against a fixed-colour image. -->
  <rect width="1200" height="630" fill="#0a0a12"/>

  <!-- Big λ accent on the left.  Sized so it reads as a brand-mark
       without crowding the title. -->
  <text x="80" y="440"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="400" font-weight="400"
        fill="url(#accent)">λ</text>

  <!-- Title block — sits above the diagram, sized to fit fully in
       the right column (was being clipped by the image before). -->
  <text x="520" y="160"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="700"
        fill="#e6e8f0">Tromp Diagrams</text>

  <text x="520" y="205"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400"
        fill="#9aa0b4">lambda calculus, drawn out</text>

  <!-- Y combinator, base64-embedded so the SVG is self-contained.
       Positioned so its dark padding bleeds into the matching solid
       background instead of cutting against a different shade. -->
  <image x="520" y="235" width="620" height="342"
         preserveAspectRatio="xMidYMid meet"
         href="data:image/png;base64,"/>

  <!-- Caption -->
  <text x="520" y="605"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="18"
        fill="#7aa2f7">Y = λf. (λx. f (x x)) (λx. f (x x))</text>
</svg>
